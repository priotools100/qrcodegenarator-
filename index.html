    <script>
        let currentFrame = 0;
        const qrcodeDiv = document.getElementById("qrcode");
        const logoPreview = document.getElementById("logo-preview");
        const captureArea = document.getElementById("capture-area");

        document.getElementById('logoInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    logoPreview.src = event.target.result;
                    logoPreview.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        function selectFrame(index, el) {
            currentFrame = index;
            document.querySelectorAll('.frame-option').forEach(f => f.classList.remove('active'));
            el.classList.add('active');
        }

        function generateQR() {
            const text = document.getElementById("qrText").value;
            if (!text) return alert("Enter content!");

            const color = document.getElementById('qrColor').value;
            qrcodeDiv.innerHTML = "";
            
            new QRCode(qrcodeDiv, {
                text: text,
                width: 280,
                height: 280,
                colorDark: color,
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });

            captureArea.style.setProperty('--qr-color', color);
            captureArea.className = "bg-white p-8 rounded-2xl relative transition-all shadow-2xl";
            if(currentFrame > 0) captureArea.classList.add(`frame-${currentFrame}`);

            document.getElementById("download-section").classList.remove("hidden");
        }

        function downloadQR() {
            html2canvas(captureArea, { scale: 3, useCORS: true }).then(canvas => {
                const link = document.createElement("a");
                link.download = "QR-Studio-Pro.png";
                link.href = canvas.toDataURL();
                link.click();
            });
        }
    </script>
