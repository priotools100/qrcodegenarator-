                    <div class="glass-card p-6 rounded-3xl">
                        <div class="grid grid-cols-3 gap-2" id="frameList">
                            <div onclick="selectFrame(0, this)" class="frame-option active p-2 text-center rounded-lg text-[9px] font-black">MINIMAL</div>
                            <div onclick="selectFrame(1, this)" class="frame-option p-2 text-center rounded-lg text-[9px] font-black">CLASSIC</div>

    <script>
        let currentFrame = 0;
        const qrcodeDiv = document.getElementById("qrcode");
        const logoPreview = document.getElementById("logo-preview");
        const captureArea = document.getElementById("capture-area");

        document.getElementById('logoInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => { logoPreview.src = event.target.result; logoPreview.classList.remove('hidden'); }
                reader.readAsDataURL(file);
            }
        });

        function selectFrame(index, el) {
            currentFrame = index;
            document.querySelectorAll('.frame-option').forEach(f => f.classList.remove('active'));
            el.classList.add('active');
        }

        function generateQR() {
            const text = document.getElementById("qrText").value;
            if (!text) return alert("Enter content!");
            const color = document.getElementById('qrColor').value;
            qrcodeDiv.innerHTML = "";
            new QRCode(qrcodeDiv, { text: text, width: 250, height: 250, colorDark: color, colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.H });
            captureArea.style.setProperty('--qr-color', color);
            captureArea.className = "bg-white p-6 rounded-2xl relative";
            if(currentFrame > 0) captureArea.classList.add(`frame-${currentFrame}`);
            document.getElementById("download-section").classList.remove("hidden");
        }

        function downloadQR() {
            html2canvas(captureArea, { scale: 3, useCORS: true }).then(canvas => {
                const link = document.createElement("a");
                link.download = "QR-Code.png";
                link.href = canvas.toDataURL();
                link.click();
            });
        }
    </script>
